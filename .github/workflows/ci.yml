name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/fixit-client:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/fixit-client:staging
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_KEYCLOAK_URL=${{ secrets.NEXT_PUBLIC_KEYCLOAK_URL }}
            NEXT_PUBLIC_KEYCLOAK_REALM=FixIt
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=fixit-nextjs-client
            NEXT_PUBLIC_UNLEASH_URL=${{ secrets.NEXT_PUBLIC_UNLEASH_URL }}
            NEXT_PUBLIC_UNLEASH_CLIENT_KEY=default:development.unleash-insecure-frontend-api-token
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/fixit-client:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/fixit-client:buildcache,mode=max
